# /boot/limine.cfg
# Mahina Bootloader Configuration
# Authority: Volume II / 02_boot_flow.md §Stage 0, DL-005
# Bootloader: limine (UEFI-first, DL-005)
#
# Boot parameters:
#   quiet   — suppress kernel printk output during normal boot (02_boot_flow.md)
#   splash  — luna-init activates boot splash mode (no-op in v0.1; luna-splash not yet built)
#   rw      — root filesystem mounted read-write immediately
#
# TODO (documented open question in 02_boot_flow.md):
#   A "lunadebug" parameter disabling quiet+splash and enabling verbose luna-init
#   output has not been formally specified. Will be added as a DL entry before v0.5.

TIMEOUT=1

:Mahina
    PROTOCOL=linux
    KERNEL_PATH=boot:///vmlinuz-mahina
    CMDLINE=root=/dev/vda2 rw quiet splash
    MODULE_PATH=boot:///initramfs-mahina.img
